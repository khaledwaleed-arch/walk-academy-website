<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — Walk Business</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root { --primary:#0D3B5C; --accent:#F58220; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:#F5F5F5; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card {
      background:#fff; border-radius:20px; padding:60px 48px;
      text-align:center; max-width:520px; width:90%;
      box-shadow:0 8px 40px rgba(13,59,92,0.14);
    }
    .icon-circle {
      width:96px; height:96px; border-radius:50%;
      background:rgba(245,130,32,0.12); display:flex; align-items:center; justify-content:center;
      margin:0 auto 28px; font-size:2.6rem; color:var(--accent);
    }
    h1 { color:var(--primary); font-size:2rem; margin-bottom:12px; }
    p  { color:#555; font-size:1.05rem; line-height:1.7; margin-bottom:32px; }
    .btn {
      display:inline-flex; align-items:center; gap:10px;
      background:var(--accent); color:#fff; padding:14px 32px;
      border-radius:50px; font-size:1rem; font-weight:600;
      text-decoration:none; transition:all 0.3s;
    }
    .btn:hover { background:#d9700f; transform:translateY(-2px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-circle"><i class="fas fa-check-circle"></i></div>
    <h1>Registration Confirmed!</h1>
    <p>Thank you for enrolling with <strong>Walk Academy</strong>. Your payment has been processed successfully. We will reach out within <strong>24 hours</strong> with your course access details.</p>
    <a href="index.html" class="btn"><i class="fas fa-home"></i> Back to Home</a>
  </div>
</body>
</html>
